# Pre-commit hooks configuration for the tapedeck repository.
# Run `pre-commit install --hook-type pre-push` after cloning.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-push]
  - repo: local
    hooks:
      - id: github-actions-checks
        name: Run GitHub Actions checks
        entry: scripts/check-ci.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
